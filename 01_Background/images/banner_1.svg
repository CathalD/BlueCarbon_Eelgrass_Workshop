  <path d="M975 300 C 960 210 990 150 970 85" stroke="#1f7a4d" stroke-width="6" opacity="0.8"/>
  <path d="M1015 300 C 1030 240 1005 180 1025 115" stroke="#2c9a5f" stroke-width="6" opacity="0.8"/>
  <path d="M1150 300 C 1140 220 1165 160 1145 95" stroke="#1f7a4d" stroke-width="6" opacity="0.7"/>
  <path d="M1185 300 C 1195 235 1170 175 1190 110" stroke="#2c9a5f" stroke-width="6" opacity="0.7"/>
</g>

<rect x="470" y="150" width="18" height="150" rx="3" fill="#e8e2d5" stroke="#8a836f" stroke-width="1.5" opacity="0.95"/>
<rect x="470" y="150" width="18" height="20" fill="#c9c2b0"/>
<rect x="470" y="235" width="18" height="65" fill="#5c4632" opacity="0.7"/>

<text x="600" y="185" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="42" font-weight="600" fill="#ffffff">Blue Carbon Eelgrass Workshop</text>
<text x="600" y="218" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#dff2f8">Sampling design &#8226; field methods &#8226; lab analysis &#8226; carbon stock estimation</text>
<text x="600" y="340" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#f1e9dc" opacity="0.9">WWF-Canada &#8226; Science, Knowledge and Innovation</text>
