<svg width="1200" height="360" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Blue Carbon Eelgrass Workshop</title>
<desc>Illustration of an eelgrass meadow beneath the water surface, with layered sediment at the base representing a sediment core.</desc>
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#bfe3f0"/>
    <stop offset="100%" stop-color="#5fb3d1"/>
  </linearGradient>
  <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#2c8fb0"/>
    <stop offset="55%" stop-color="#1c6f92"/>
    <stop offset="100%" stop-color="#0f4c66"/>
  </linearGradient>
  <linearGradient id="sediment" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#8a6b4a"/>
    <stop offset="100%" stop-color="#4a3826"/>
  </linearGradient>
</defs>

<rect x="0" y="0" width="1200" height="90" fill="url(#sky)"/>
<rect x="0" y="90" width="1200" height="210" fill="url(#water)"/>
<rect x="0" y="300" width="1200" height="60" fill="url(#sediment)"/>

<circle cx="1040" cy="55" r="26" fill="#fff6d8" opacity="0.9"/>

<g opacity="0.25" stroke="#eaf7fb" stroke-width="2" fill="none" stroke-linecap="round">
  <path d="M0 60 Q 60 45 120 60 T 240 60 T 360 60"/>
  <path d="M700 40 Q 760 25 820 40 T 940 40 T 1060 40"/>
</g>

<g stroke="#4a3826" stroke-width="1" opacity="0.5">
  <line x1="0" y1="312" x2="1200" y2="312"/>
  <line x1="0" y1="330" x2="1200" y2="330"/>
  <line x1="0" y1="348" x2="1200" y2="348"/>
</g>

<g fill="none" stroke-linecap="round">
  <path d="M60 300 C 50 220 75 160 55 90" stroke="#1f7a4d" stroke-width="6" opacity="0.85"/>
  <path d="M95 300 C 110 230 80 170 100 100" stroke="#2c9a5f" stroke-width="6" opacity="0.85"/>
  <path d="M135 300 C 120 210 150 150 130 80" stroke="#1f7a4d" stroke-width="6" opacity="0.8"/>
  <path d="M175 300 C 190 240 165 180 185 110" stroke="#2c9a5f" stroke-width="6" opacity="0.8"/>

