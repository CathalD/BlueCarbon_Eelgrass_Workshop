  <line x1="0" y1="315" x2="1200" y2="315"/>
  <line x1="0" y1="330" x2="1200" y2="330"/>
  <line x1="0" y1="345" x2="1200" y2="345"/>
</g>

<g fill="none" stroke-linecap="round">
  <path d="M60 270 C 50 200 75 150 55 90" stroke="#1f7a4d" stroke-width="6" opacity="0.85"/>
  <path d="M95 270 C 110 210 80 160 100 100" stroke="#2c9a5f" stroke-width="6" opacity="0.85"/>
