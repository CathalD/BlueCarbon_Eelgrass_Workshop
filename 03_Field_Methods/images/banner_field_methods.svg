<!-- Sediment corer: casing in the water column, core sample visible extending deep into the sediment -->
<rect x="225" y="150" width="18" height="195" rx="3" fill="#e8e2d5" stroke="#8a836f" stroke-width="1.5" opacity="0.95"/>
<rect x="225" y="150" width="18" height="20" fill="#c9c2b0"/>
<rect x="225" y="270" width="18" height="75" fill="#332417" opacity="0.9"/>

<!-- Section wayfinding tag -->
<rect x="40" y="28" width="168" height="32" rx="16" fill="#0f4c66" opacity="0.55"/>
<text x="124" y="49" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="1" fill="#eaf7fb">SECTION 3 OF 4</text>

<text x="600" y="192" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="46" font-weight="600" fill="#ffffff">Field Methods</text>
<text x="600" y="226" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" letter-spacing="1" fill="#dff2f8">CORE COLLECTION &#8226; EQUIPMENT &amp; DATASHEETS &#8226; CORING HOW-TO VIDEOS</text>
