<svg width="1200" height="360" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Field Methods — Blue Carbon Eelgrass Workshop</title>
<desc>Illustration of an eelgrass meadow beneath the water surface, with a sediment corer extending down into a layered sediment core, headed "Field Methods".</desc>
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#bfe3f0"/>
    <stop offset="100%" stop-color="#5fb3d1"/>
  </linearGradient>
  <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#2c8fb0"/>
    <stop offset="55%" stop-color="#1c6f92"/>
    <stop offset="100%" stop-color="#0f4c66"/>
  </linearGradient>
  <linearGradient id="sediment" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#9c7a54"/>
    <stop offset="35%" stop-color="#7a5c3d"/>
    <stop offset="70%" stop-color="#553f29"/>
    <stop offset="100%" stop-color="#322417"/>
  </linearGradient>
</defs>

<rect x="0" y="0" width="1200" height="90" fill="url(#sky)"/>
<rect x="0" y="90" width="1200" height="180" fill="url(#water)"/>
<rect x="0" y="270" width="1200" height="90" fill="url(#sediment)"/>

<circle cx="1040" cy="55" r="26" fill="#fff6d8" opacity="0.9"/>

<g opacity="0.25" stroke="#eaf7fb" stroke-width="2" fill="none" stroke-linecap="round">
